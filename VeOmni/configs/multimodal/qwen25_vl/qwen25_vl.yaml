model:
  model_path: Qwen/Qwen2.5-VL-7B-Instruct
  ops_implementation:
    attn_implementation: flash_attention_2

data:
  train_path: sharegpt4v_pretrain
  data_type: conversation
  chat_template: qwen2_5vl
  max_seq_len: 4096
  train_size: 80000000
  mm_configs:
    image_max_pixels: 602112 # 28 * 28 * 768
    video_max_pixels: 602112 # 28 * 28 * 768
    max_frames: 16
    fps: 2.0
    use_audio_in_video: false

train:
  accelerator:
    ulysses_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
  gradient_checkpointing:
    enable_reentrant: false
  wandb:
    enable: false
    project: qwen25_vl
    name: qwen25_vl
  freeze_vit: false
  optimizer:
    lr: 1.0e-5
    lr_decay_style: cosine
  num_train_epochs: 2
  micro_batch_size: 1
  global_batch_size: 16
  max_steps: 500
  init_device: meta
  profile:
    enable: true
    start_step: 20
    end_step: 21
    record_shapes: true
  checkpoint:
    output_dir: qwen25_vl_sft
    manager: dcp
    save_hf_weights: false
