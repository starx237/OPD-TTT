name: Check PR Code Format

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

env:
  RUFF_VERSION: "0.13.2"

jobs:
  check_pr_lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: .
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ruff
        run: pip install ruff==${{ env.RUFF_VERSION }}

      - name: Run ruff lint and format check
        run: |
          failed=0
          ruff check tasks tests veomni docs || failed=1
          ruff format --check tasks tests veomni docs || failed=1
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "=========================================="
            echo "  Fix: run 'make style && make quality'"
            echo "  Ruff version: ${{ env.RUFF_VERSION }}"
            echo "=========================================="
            exit 1
          fi
