# Qwen3.5-2B + In-Place TTT 评估配置（单 GPU）
#
# 与训练配置的关键区别：
# - data_parallel_mode: ddp + init_device: cuda（单 GPU 下 fsdp2 不可用：
#   VeOmni 要求 fsdp2→meta，但 1 GPU 时 fsdp_enabled=False 又拒绝 meta）
# - DDP bf16 模型与 FSDP2 MixedPrecision 等价（forward 均 bf16），PPL 可信
# - ttt_lr: 3.0（与训练一致，经设计决定，暂不修改）
# - enable_activation_offload: false（评估在 no_grad 下无需保存激活，开启只增开销）
# - load_path 由 OPDTTT_LOAD_PATH 环境变量覆盖，无需在此指定
# - ttt_lr 可由 OPDTTT_EVAL_TTT_LR 环境变量覆盖
#
# 用法: bash scripts/eval_single.sh [GPU_ID] [STEP]

# ========== 模型配置 ==========
model:
  model_path: model_assets/qwen3.5-2b
  tokenizer_path: model_assets/qwen3.5-2b
  attn_implementation: flash_attention_2

# ========== 数据配置 ==========
data:
  data_dir: data
  train_path: data/piles_packed_32768_shuffled.jsonl
  train_size: 20000000000
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 32768
  text_keys: content_split
  drop_last: true
  dataloader:
    type: native
    num_workers: 0
    prefetch_factor: null

# ========== 训练配置 ==========
train:
  output_dir: data/output/qwen35_2b_ttt
  data_parallel_mode: ddp
  ulysses_parallel_size: 1
  global_batch_size: 60
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  wandb_project: opdttt-experiments
  wandb_name: qwen35-2b-ttt-eval
  max_steps: 5000
  rmpad_with_pos_ids: false
  dyn_bsz_margin: 0
  dyn_bsz: false
  optimizer: adamw
  lr: 5.0e-6
  lr_warmup_ratio: 0.02
  lr_decay_style: cosine
  lr_decay_ratio: 0.90
  weight_decay: 0.1
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  empty_cache_steps: 10
  seed: 42

  checkpoint:
    output_dir: data/output/qwen35_2b_ttt
    manager: dcp
    save_steps: 100
    save_hf_weights: true
    # load_path 由 OPDTTT_LOAD_PATH 环境变量覆盖
    load_path: ""

# ========== OPD-TTT 配置 ==========
opdttt:
  model_type: qwen3_5
  sliding_window: 4096

  # 无教师（纯TTT持续预训练）
  teacher_model_path: ""

  # TTT层配置：每4层一个，共6个TTT层
  opdttt_layers: [0, 4, 8, 12, 16, 20]
  # ttt_lr 与训练保持一致（3.0），经设计决定暂不修改。
  # 如需实验不同评估学习率，可通过 OPDTTT_EVAL_TTT_LR 环境变量覆盖。
  ttt_lr: 3.0
  ttt_chunk: 1024
  ttt_proj: true
  ttt_max_norm: 0

  # 损失权重（纯CE，无教师对齐）
  lambda_ntp: 1.0
  lambda_align_rep: 0.0
  lambda_kl: 0.0
  lambda_lm: 1.0

  teacher_proj_init: "random"
  teacher_embeddings_path: ""
  weight_adaptation: "fixed"

  # 检查点策略
  keep_all_checkpoints: true
  save_best: true
