# 阶段2：On-Policy Distillation
# 目标：使用教师模型的密集奖励信号优化学生策略
# 对应OPD论文中的on-policy distillation阶段

# ========== 模型配置 ==========
model:
  config_path: model_assets/llama_500m_config
  model_path: data/output/500m_stage2_sft/checkpoints/global_step_3000/hf_ckpt
  tokenizer_path: model_assets/tokenizer
  vocab_size: 151665

# ========== 数据配置（OPD阶段使用prompt数据）==========
data:
  data_dir: data
  # 使用提示词数据集（用于从学生模型自回归采样）
  train_path: data/opd_prompts_train.jsonl
  train_size: 100000         # 100K prompts（OPD效率高，不需要大量数据）
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 8192
  text_keys: prompt
  drop_last: false

# ========== 训练配置 ==========
train:
  output_dir: data/output/500m_stage2_opd
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 1
  global_batch_size: 35       # 较小batch，因为OPD密集奖励
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  wandb_project: opdttt-experiments
  wandb_name: 500m-stage2-opd
  max_steps: 5000             # OPD收敛快（论文说约150步就有显著提升）
  optimizer: adamw
  lr: 1.0e-5                  # OPD使用较小学习率
  lr_warmup_ratio: 0.05
  lr_decay_style: constant     # OPD通常使用恒定学习率
  lr_min: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: false
  enable_full_shard: true
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: meta
  ckpt_manager: dcp
  save_checkpoint_path: data/output/500m_stage2_opd/checkpoints
  save_steps: 500
  save_hf_weights: true
  empty_cache_steps: 10
  seed: 42

# ========== 阶段2特定参数（On-Policy Distillation）==========
opdttt:
  # 阶段2必须使用教师
  teacher_model_path: "model_assets/teacher_qwen2.5_7b"

  # 启用OPD on-policy采样（阶段2核心功能）
  enable_opd_sampling: true

  # 启用教师输出缓存
  enable_teacher_cache: true

  # TTT参数
  ttt_lr: 3
  ttt_chunk: 1024
  ttt_proj: true
  ttt_max_norm: 1e-5
  opdttt_layers: [0, 6, 12, 18]

  # OPD采样参数（扁平结构，匹配dataclass字段名）
  opd_temperature: 1.0
  opd_max_sample_length: 512
  opd_top_p: 0.9
  opd_num_trajectories: 1
  opd_prompt_field: prompt

  # 损失权重
  lambda_ntp: 1.0
  lambda_align_rep: 0.0
  lambda_kl: 0.0
  lambda_lm: 0.0

  # 权重初始化
  teacher_proj_init: "random"
  teacher_embeddings_path: ""
  weight_adaptation: "fixed"
