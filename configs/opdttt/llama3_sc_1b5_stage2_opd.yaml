# 阶段2：On-Policy Distillation（1.5B模型）
# 目标：使用教师模型的密集奖励信号优化学生策略
# 对应OPD论文中的on-policy distillation阶段

# ========== 模型配置 ==========
model:
  # 加载阶段1训练好的checkpoint
  model_path: data/output/1b5_stage1_pretrain/checkpoints/global_step_14325/hf_ckpt
  tokenizer_path: model_assets/tokenizer
  vocab_size: 151665

  # OPD-TTT设置（带教师）
  foundation:
    opdttt_mode: true
    opdttt_layers: [0, 6, 12, 18]
    ttt_proj: true
    ttt_lr: 0.3
    ttt_chunk: 4096
    ttt_target: input_embed

    # 阶段2损失权重：使用教师指导
    lambda_ntp: 1.0           # NTP对齐（自监督）
    lambda_align_rep: 0.0     # 教师表示对齐（设为0禁用，因为主要靠reverse KL）
    lambda_kl: 0.0           # 不使用KL散度，改用reverse KL作为reward
    lambda_lm: 0.0            # OPD阶段不使用标准LM loss

# ========== 数据配置（OPD阶段使用prompt数据）==========
data:
  data_dir: data
  # 使用提示词数据集（用于从学生模型自回归采样）
  train_path: data/opd_prompts.jsonl
  train_size: 100000         # 100K prompts（OPD效率高，不需要大量数据）
  dataloader_type: native
  datasets_type: iterable
  data_type: plaintext
  max_seq_len: 2048          # prompt长度，采样时会生成更长序列
  text_keys: prompt
  drop_last: true

# ========== 训练配置 ==========
train:
  output_dir: data/output/1b5_stage2_opd
  data_parallel_mode: fsdp2
  ulysses_parallel_size: 1
  global_batch_size: 16       # 1.5B模型使用较小batch
  micro_batch_size: 1
  rmpad: false
  use_wandb: true
  wandb_project: opdttt-experiments
  wandb_name: 1b5-stage2-opd
  max_steps: 5000             # OPD收敛快（论文说约150步就有显著提升）
  optimizer: adamw
  lr: 1.0e-5                  # OPD使用较小学习率
  lr_warmup_ratio: 0.05
  lr_decay_style: constant     # OPD通常使用恒定学习率
  lr_min: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  enable_mixed_precision: true
  enable_gradient_checkpointing: false
  enable_full_shard: true
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: meta
  ckpt_manager: dcp
  save_checkpoint_path: data/output/1b5_stage2_opd/checkpoints
  save_steps: 100
  save_hf_weights: true
  empty_cache_steps: 10
  seed: 42

# ========== 阶段2特定参数（On-Policy Distillation）==========
opdttt:
  # 阶段2必须使用教师（1.5B使用更大的教师）
  teacher_model_path: "model_assets/teacher_qwen2.5_32b"

  # 启用教师输出缓存
  enable_teacher_cache: true

  # TTT参数
  ttt_lr: 0.3
  ttt_chunk: 2048             # 较小chunk，因为序列较短
  ttt_proj: true
  opdttt_layers: [0, 6, 12, 18]

  # OPD采样参数
  opd_sampling:
    # 采样温度
    temperature: 1.0
    # 最大采样长度
    max_sample_length: 2048
    # 是否使用top-p采样
    top_p: 0.9
    # 每个prompt的采样轨迹数
    num_trajectories_per_prompt: 1

  # 反向KL作为reward
  use_reverse_kl_reward: true

  # 阶段2可以使用PCA初始化（如果有阶段1提取的教师嵌入）
  teacher_proj_init: "random"
  teacher_embeddings_path: ""
  weight_adaptation: "adaptive"    # OPD阶段使用自适应权重
